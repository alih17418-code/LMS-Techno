kind = "web"
previewPath = "/"
title = "LMS Finance"
version = "1.0.0"
id = "artifacts/lms-finance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24686

[services.development]
run = "pnpm --filter @workspace/lms-finance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lms-finance", "run", "build" ]
publicDir = "artifacts/lms-finance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24686"
BASE_PATH = "/"
